<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إدارة الآراء | Almaya Couture</title>
  <link rel="icon" href="images/logo.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="config.js"></script>
  
  <style>
    /* ========== DARK THEME (Défaut) ========== */
    :root {
      --bg-primary: #0F0B08;
      --bg-secondary: #1A1510;
      --bg-card: #231D15;
      --gold: #C4A06A;
      --gold-light: #D4B896;
      --text-primary: #F5EDD8;
      --text-secondary: #A89880;
      --text-muted: #6B5F52;
      --border: rgba(196,160,106,0.15);
      --success: #25D366;
      --danger: #FF4757;
      --warning: #FFA502;
      --radius-sm: 10px;
      --radius: 16px;
      --radius-lg: 20px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* ========== WHITE THEME ========== */
    body.white-theme {
      --bg-primary: #F5F0E8;
      --bg-secondary: #FDFCF8;
      --bg-card: #FFFFFF;
      --gold: #A07840;
      --gold-light: #C4A06A;
      --text-primary: #2A2218;
      --text-secondary: #6B5F52;
      --text-muted: #8B7B68;
      --border: rgba(160,120,64,0.12);
      --success: #25D366;
      --danger: #E74C3C;
      --warning: #E67E00;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-primary);
      font-family: 'Tajawal', sans-serif;
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      line-height: 1.6;
      transition: background-color 0.5s ease, color 0.5s ease;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg-secondary); }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

    #header-container { position: sticky; top: 0; z-index: 50; }
    .main-content { flex: 1; }

    .admin-container { max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.5rem; }

    .admin-header { text-align: center; margin-bottom: 2.5rem; }
    .admin-header .icon-circle {
      display: inline-flex; align-items: center; justify-content: center;
      width: 60px; height: 60px;
      background: linear-gradient(135deg, rgba(196,160,106,0.15), rgba(196,160,106,0.05));
      border: 1px solid var(--border); border-radius: 50%;
      margin-bottom: 1rem; font-size: 1.5rem; color: var(--gold);
    }
    .admin-header h1 { font-size: clamp(1.5rem, 4vw, 2rem); font-weight: 800; color: var(--text-primary); margin-bottom: 0.4rem; }
    .admin-header p { color: var(--text-muted); font-size: 0.9rem; }

    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.25rem; margin-bottom: 2rem; }
    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.5rem; text-align: center;
      transition: var(--transition); cursor: pointer;
    }
    .stat-card:hover { border-color: rgba(196,160,106,0.3); transform: translateY(-2px); }
    .stat-card.active { border-color: var(--gold); box-shadow: 0 0 20px rgba(196,160,106,0.2); }
    .stat-number { font-size: 2rem; font-weight: 800; }
    .stat-label { font-size: 0.75rem; color: var(--text-muted); }

    .message {
      padding: 0.85rem 1.25rem; border-radius: var(--radius-sm);
      margin-bottom: 1.25rem; text-align: center; font-weight: 600;
      font-size: 0.85rem; display: none; animation: slideDown 0.3s ease;
    }
    @keyframes slideDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
    .message.success { background: rgba(37,211,102,0.1); color: var(--success); border: 1px solid rgba(37,211,102,0.3); }
    .message.error { background: rgba(255,71,87,0.1); color: var(--danger); border: 1px solid rgba(255,71,87,0.3); }
    .message.info { background: rgba(196,160,106,0.1); color: var(--gold); border: 1px solid rgba(196,160,106,0.3); }

    .filter-bar {
      display: flex; gap: 0.35rem; margin-bottom: 1.5rem;
      background: var(--bg-secondary); padding: 0.35rem;
      border-radius: 12px; border: 1px solid var(--border);
    }
    .filter-tab {
      flex: 1; padding: 0.65rem 1rem; background: transparent; border: none;
      color: var(--text-secondary); font-size: 0.8rem; font-weight: 600;
      cursor: pointer; border-radius: 10px; transition: var(--transition);
      font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 0.4rem;
    }
    .filter-tab.active { background: rgba(196,160,106,0.15); color: var(--gold); }
    .filter-tab:hover:not(.active) { color: var(--text-primary); }

    .btn {
      padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.75rem; font-weight: 700;
      cursor: pointer; transition: var(--transition); font-family: inherit; border: none;
      display: inline-flex; align-items: center; gap: 0.35rem;
    }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

    .reviews-list { display: flex; flex-direction: column; gap: 1rem; }
    .review-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.5rem; transition: var(--transition);
    }
    .review-card.status-pending { border-right: 3px solid var(--warning); }
    .review-card.status-approved { border-right: 3px solid var(--success); }
    .review-card.status-rejected { opacity: 0.65; border-right: 3px solid var(--danger); }
    .review-text {
      color: var(--text-secondary); font-size: 0.9rem; line-height: 1.7;
      margin-bottom: 1rem; padding: 0.75rem;
      background: rgba(26,21,16,0.15); border-radius: var(--radius-sm);
    }
    .btn-approve { background: rgba(37,211,102,0.15); color: var(--success); border: 1px solid rgba(37,211,102,0.3); }
    .btn-reject { background: rgba(255,71,87,0.08); color: var(--danger); border: 1px solid rgba(255,71,87,0.2); }
    .btn-pend { background: rgba(255,165,2,0.08); color: var(--warning); border: 1px solid rgba(255,165,2,0.2); }
    .btn-delete { background: rgba(255,71,87,0.05); color: var(--danger); border: 1px solid rgba(255,71,87,0.1); }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px); z-index: 200;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 2rem;
      max-width: 420px; width: 95%; text-align: center;
    }

    .loader {
      width: 40px; height: 40px; border: 3px solid rgba(196,160,106,0.3);
      border-radius: 50%; border-top-color: var(--gold);
      animation: spin 0.8s ease-in-out infinite; margin: 2rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ========== THEME TOGGLE ========== */
    .theme-toggle-btn {
      position: fixed; bottom: 30px; right: 30px; width: 48px; height: 48px;
      border-radius: 50%; background: var(--bg-card); border: 2px solid var(--border);
      color: var(--gold); font-size: 1.2rem; cursor: pointer; z-index: 99;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.4s; box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      animation: themePulse 2s ease-in-out infinite;
    }
    .theme-toggle-btn:hover { transform: scale(1.1) rotate(15deg); border-color: var(--gold); }
    body.white-theme .theme-toggle-btn { background: #FFFFFF; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
    @keyframes themePulse { 0%,100%{ box-shadow:0 4px 15px rgba(196,160,106,0.15); } 50%{ box-shadow:0 4px 25px rgba(196,160,106,0.3); } }

    #footer-container { margin-top: auto; }

    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .admin-container { padding: 1.25rem 0.75rem; }
      .theme-toggle-btn { bottom: 20px; right: 20px; width: 42px; height: 42px; }
    }
  </style>
</head>
<body>

  <div id="header-container"></div>

  <div class="main-content">
    <div class="admin-container">
      
      <div class="admin-header">
        <div class="icon-circle"><i class="fas fa-star"></i></div>
        <h1>إدارة آراء الزبائن</h1>
        <p>مراجعة، قبول، رفض أو حذف الآراء</p>
      </div>

      <div class="message" id="message"></div>

      <div class="stats-grid">
        <div class="stat-card active" data-filter="all" onclick="setFilter('all')">
          <div class="stat-icon" style="color:var(--gold);font-size:1.3rem;margin-bottom:0.5rem;"><i class="fas fa-comments"></i></div>
          <div class="stat-number" id="totalCount">0</div>
          <div class="stat-label">كل الآراء</div>
        </div>
        <div class="stat-card" data-filter="approved" onclick="setFilter('approved')">
          <div class="stat-icon" style="color:var(--success);font-size:1.3rem;margin-bottom:0.5rem;"><i class="fas fa-check-circle"></i></div>
          <div class="stat-number" id="approvedCount">0</div>
          <div class="stat-label">مقبولة</div>
        </div>
        <div class="stat-card" data-filter="pending" onclick="setFilter('pending')">
          <div class="stat-icon" style="color:var(--warning);font-size:1.3rem;margin-bottom:0.5rem;"><i class="fas fa-clock"></i></div>
          <div class="stat-number" id="pendingCount">0</div>
          <div class="stat-label">قيد الانتظار</div>
        </div>
        <div class="stat-card" data-filter="rejected" onclick="setFilter('rejected')">
          <div class="stat-icon" style="color:var(--danger);font-size:1.3rem;margin-bottom:0.5rem;"><i class="fas fa-times-circle"></i></div>
          <div class="stat-number" id="rejectedCount">0</div>
          <div class="stat-label">مرفوضة</div>
        </div>
      </div>

      <div class="filter-bar">
        <button class="filter-tab active" data-filter="all"><i class="fas fa-list"></i> الكل <span class="count-badge" id="badgeAll" style="background:rgba(196,160,106,0.2);padding:0.15rem 0.5rem;border-radius:10px;font-size:0.7rem;">0</span></button>
        <button class="filter-tab" data-filter="approved"><i class="fas fa-check"></i> مقبولة <span class="count-badge" id="badgeApproved" style="background:rgba(196,160,106,0.2);padding:0.15rem 0.5rem;border-radius:10px;font-size:0.7rem;">0</span></button>
        <button class="filter-tab" data-filter="pending"><i class="fas fa-clock"></i> قيد الانتظار <span class="count-badge" id="badgePending" style="background:rgba(196,160,106,0.2);padding:0.15rem 0.5rem;border-radius:10px;font-size:0.7rem;">0</span></button>
        <button class="filter-tab" data-filter="rejected"><i class="fas fa-times"></i> مرفوضة <span class="count-badge" id="badgeRejected" style="background:rgba(196,160,106,0.2);padding:0.15rem 0.5rem;border-radius:10px;font-size:0.7rem;">0</span></button>
      </div>
      
      <div class="toolbar-actions" style="display:flex;gap:0.5rem;margin-bottom:1rem;">
        <button class="btn btn-outline" onclick="loadAllReviews()"><i class="fas fa-sync-alt"></i> تحديث</button>
      </div>

      <div class="reviews-list" id="reviewsList"><div class="loader"></div></div>
    </div>
  </div>

  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <h3><i class="fas fa-exclamation-triangle" style="color:var(--danger);"></i> تأكيد الحذف</h3>
      <p style="color:var(--text-secondary);">سيتم حذف هذا الرأي نهائياً.</p>
      <div class="review-preview" id="deleteReviewPreview" style="background:rgba(26,21,16,0.1);padding:0.5rem;border-radius:8px;font-size:0.8rem;margin-bottom:1.5rem;color:var(--text-muted);"></div>
      <div class="btn-group" style="display:flex;gap:0.75rem;justify-content:center;">
        <button class="btn btn-delete" id="confirmDeleteBtn" style="background:rgba(255,71,87,0.2);"><i class="fas fa-trash-alt"></i> نعم، احذف</button>
        <button class="btn btn-outline" onclick="closeDeleteModal()"><i class="fas fa-times"></i> إلغاء</button>
      </div>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="header.js"></script>
  <script src="footer.js"></script>

  <script>
    // ========== THEME TOGGLE ==========
    (function() {
      function createToggleButton() {
        if (document.querySelector('.theme-toggle-btn')) return;
        const btn = document.createElement('button');
        btn.className = 'theme-toggle-btn';
        btn.innerHTML = '<i class="fas fa-moon"></i>';
        btn.addEventListener('click', function() {
          const isWhite = document.body.classList.contains('white-theme');
          if (isWhite) { document.body.classList.remove('white-theme'); localStorage.setItem('almaya-theme', 'dark'); }
          else { document.body.classList.add('white-theme'); localStorage.setItem('almaya-theme', 'white'); }
          updateIcon();
        });
        document.body.appendChild(btn);
        updateIcon();
      }
      function updateIcon() { const btn = document.querySelector('.theme-toggle-btn'); if (btn) btn.innerHTML = document.body.classList.contains('white-theme') ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>'; }
      function applySaved() { const s = localStorage.getItem('almaya-theme'); if (s === 'white') document.body.classList.add('white-theme'); }
      applySaved(); createToggleButton();
    })();

    if (typeof CONFIG === 'undefined') throw new Error('CONFIG missing');
    const SUPABASE_URL = CONFIG.SUPABASE_URL, SUPABASE_KEY = CONFIG.SUPABASE_ANON_KEY;
    let allReviews = [], currentFilter = 'all', deleteTargetId = null;

    async function supabaseRequest(endpoint, opts = {}) {
      const res = await fetch(`${SUPABASE_URL}${endpoint}`, {
        method: opts.method || 'GET',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
        body: opts.body ? JSON.stringify(opts.body) : undefined
      });
      if (res.status === 204 || res.status === 404) return null;
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || `Erreur ${res.status}`);
      return data;
    }

    function escapeHtml(s) { return s ? s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]) : ''; }

    async function loadAllReviews() {
      document.getElementById('reviewsList').innerHTML = '<div class="loader"></div>';
      try {
        allReviews = (await supabaseRequest('/rest/v1/reviews?select=*&order=created_at.desc')) || [];
        updateStats();
        renderFilteredReviews();
      } catch(e) { showMessage('❌ فشل تحميل الآراء', 'error'); }
    }

    function updateStats() {
      const t = allReviews.length, a = allReviews.filter(r => r.is_approved === true).length;
      const p = allReviews.filter(r => r.is_approved === false).length, rj = allReviews.filter(r => r.is_approved === null).length;
      document.getElementById('totalCount').textContent = t;
      document.getElementById('approvedCount').textContent = a;
      document.getElementById('pendingCount').textContent = p;
      document.getElementById('rejectedCount').textContent = rj;
      document.getElementById('badgeAll').textContent = t;
      document.getElementById('badgeApproved').textContent = a;
      document.getElementById('badgePending').textContent = p;
      document.getElementById('badgeRejected').textContent = rj;
    }

    function renderFilteredReviews() {
      let f = [...allReviews];
      if (currentFilter === 'approved') f = f.filter(r => r.is_approved === true);
      else if (currentFilter === 'pending') f = f.filter(r => r.is_approved === false);
      else if (currentFilter === 'rejected') f = f.filter(r => r.is_approved === null);
      
      const list = document.getElementById('reviewsList');
      if (!f.length) { list.innerHTML = `<div class="empty-state" style="text-align:center;padding:4rem;color:var(--text-muted);"><i class="fas fa-inbox" style="font-size:3rem;opacity:0.3;"></i><p>لا توجد آراء</p></div>`; return; }
      
      list.innerHTML = f.map(r => {
        const cls = r.is_approved === true ? 'status-approved' : (r.is_approved === null ? 'status-rejected' : 'status-pending');
        const badge = r.is_approved === true ? '<span style="color:var(--success);"><i class="fas fa-check-circle"></i> مقبول</span>' : (r.is_approved === null ? '<span style="color:var(--danger);"><i class="fas fa-times-circle"></i> مرفوض</span>' : '<span style="color:var(--warning);"><i class="fas fa-clock"></i> قيد الانتظار</span>');
        const stars = Array(5).fill(0).map((_,i) => `<i class="fas fa-star" style="color:${i<r.rating?'var(--gold)':'rgba(196,160,106,0.2)'};font-size:0.85rem;"></i>`).join('');
        const actions = [];
        if (r.is_approved !== true) actions.push(`<button class="btn btn-approve" onclick="updateReview(${r.id},true)"><i class="fas fa-check"></i> قبول</button>`);
        if (r.is_approved !== null) actions.push(`<button class="btn btn-reject" onclick="updateReview(${r.id},null)"><i class="fas fa-times"></i> رفض</button>`);
        if (r.is_approved === true || r.is_approved === null) actions.push(`<button class="btn btn-pend" onclick="updateReview(${r.id},false)"><i class="fas fa-clock"></i> تعليق</button>`);
        actions.push(`<button class="btn btn-delete" onclick="openDeleteModal(${r.id},'${escapeHtml(r.name).replace(/'/g,"\\'")}')"><i class="fas fa-trash-alt"></i> حذف</button>`);
        return `<div class="review-card ${cls}"><div style="display:flex;justify-content:space-between;margin-bottom:0.75rem;"><div><strong style="color:var(--text-primary);">${escapeHtml(r.name)}</strong><div style="font-size:0.7rem;color:var(--text-muted);">${r.created_at?new Date(r.created_at).toLocaleDateString('ar-MA'):''}</div></div>${badge}</div><div style="margin-bottom:0.75rem;">${stars}</div><div class="review-text">${escapeHtml(r.text)}</div><div style="display:flex;gap:0.5rem;flex-wrap:wrap;">${actions.join('')}</div></div>`;
      }).join('');
    }

    window.updateReview = async function(id, status) {
      await supabaseRequest(`/rest/v1/reviews?id=eq.${id}`, { method:'PATCH', body:{ is_approved: status } });
      loadAllReviews();
    };

    window.openDeleteModal = function(id, name) {
      deleteTargetId = id;
      document.getElementById('deleteReviewPreview').textContent = `حذف رأي: ${name}`;
      document.getElementById('deleteModal').classList.add('active');
    };
    window.closeDeleteModal = function() { deleteTargetId = null; document.getElementById('deleteModal').classList.remove('active'); };
    window.confirmDelete = async function() {
      if (!deleteTargetId) return;
      await supabaseRequest(`/rest/v1/reviews?id=eq.${deleteTargetId}`, { method:'DELETE' });
      closeDeleteModal();
      loadAllReviews();
    };

    window.setFilter = function(f) {
      currentFilter = f;
      document.querySelectorAll('.filter-tab,.stat-card').forEach(el => el.classList.toggle('active', el.dataset.filter === f));
      renderFilteredReviews();
    };

    function showMessage(text, type) {
      const msg = document.getElementById('message');
      if (!msg) return;
      msg.textContent = text; msg.className = `message ${type}`; msg.style.display = 'block';
      setTimeout(() => msg.style.display = 'none', 4000);
    }

    window.loadAllReviews = loadAllReviews;
    document.getElementById('confirmDeleteBtn').addEventListener('click', confirmDelete);
    document.getElementById('deleteModal').addEventListener('click', e => { if (e.target.id === 'deleteModal') closeDeleteModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDeleteModal(); });
    loadAllReviews();
  </script>
</body>
</html>
