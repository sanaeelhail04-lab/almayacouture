<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منتجاتنا | Almaya Couture</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="config.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1A1510;
      font-family: 'Tajawal', sans-serif;
      color: #E8DDD0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #2A2218;
    }
    ::-webkit-scrollbar-thumb {
      background: #C4A06A;
      border-radius: 10px;
    }

    #header-container {
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .main-content {
      flex: 1;
    }

    /* Hero Section */
    .hero-section {
      background: linear-gradient(135deg, #1A1510 0%, #2A2218 100%);
      padding: 3rem 1.5rem;
      text-align: center;
      border-bottom: 1px solid rgba(196,160,106,0.2);
    }
    .hero-section h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      color: #F5EDD8;
      margin-bottom: 1rem;
    }
    .hero-section p {
      color: #A89880;
      font-size: 1rem;
      max-width: 600px;
      margin: 0 auto;
    }

    /* Filters */
    .filters-section {
      background: #2A2218;
      padding: 1.5rem;
      position: sticky;
      top: 70px;
      z-index: 90;
      border-bottom: 1px solid rgba(196,160,106,0.1);
    }
    .filters-container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: space-between;
      align-items: center;
    }
    .search-box {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .search-box i {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #C4A06A;
    }
    .search-box input {
      width: 100%;
      padding: 0.75rem 2.5rem 0.75rem 1rem;
      background: #1A1510;
      border: 1px solid rgba(196,160,106,0.2);
      border-radius: 12px;
      color: #E8DDD0;
      font-family: inherit;
      font-size: 0.9rem;
      transition: all 0.3s;
    }
    .search-box input:focus {
      outline: none;
      border-color: #C4A06A;
      box-shadow: 0 0 0 2px rgba(196,160,106,0.1);
    }
    .filter-group {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .filter-select {
      padding: 0.75rem 1rem;
      background: #1A1510;
      border: 1px solid rgba(196,160,106,0.2);
      border-radius: 12px;
      color: #E8DDD0;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    .filter-select:hover, .filter-select:focus {
      border-color: #C4A06A;
      outline: none;
    }
    .products-count {
      color: #C4A06A;
      font-size: 0.85rem;
      font-weight: 500;
    }

    /* Products Grid */
    .products-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
    }

    /* Product Card */
    .product-card {
      background: #2A2218;
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
      border: 1px solid rgba(196,160,106,0.1);
    }
    .product-card:hover {
      transform: translateY(-5px);
      border-color: rgba(196,160,106,0.3);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .product-image {
      position: relative;
      overflow: hidden;
      aspect-ratio: 3/4;
      background: #1A1510;
    }
    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .product-card:hover .product-image img {
      transform: scale(1.05);
    }
    .product-badge {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: #C4A06A;
      color: #1A1510;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      z-index: 2;
    }
    .product-badge.featured {
      background: #C4A06A;
    }
    .product-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .product-card:hover .product-overlay {
      opacity: 1;
    }
    .quick-view {
      background: #C4A06A;
      color: #1A1510;
      padding: 0.6rem 1.2rem;
      border-radius: 30px;
      font-size: 0.85rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
    }
    .quick-view:hover {
      background: #D4B896;
      transform: scale(1.05);
    }
    .product-info {
      padding: 1.2rem;
    }
    .product-category {
      color: #C4A06A;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }
    .product-title {
      font-size: 1rem;
      font-weight: 700;
      color: #F5EDD8;
      margin-bottom: 0.5rem;
      line-height: 1.4;
    }
    .product-price {
      color: #C4A06A;
      font-size: 0.9rem;
      font-weight: 600;
    }
    .product-description {
      font-size: 0.8rem;
      color: #A89880;
      margin-top: 0.5rem;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(10px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }
    .product-modal {
      background: #2A2218;
      border-radius: 20px;
      max-width: 900px;
      width: 95%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      animation: modalFadeIn 0.3s ease;
    }
    @keyframes modalFadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    .modal-close {
      position: absolute;
      top: 1rem;
      left: 1rem;
      background: rgba(255,255,255,0.1);
      border: none;
      color: #E8DDD0;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.3s;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-close:hover {
      background: rgba(255,71,87,0.8);
      transform: rotate(90deg);
    }
    .modal-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      padding: 1.5rem;
    }
    .modal-gallery {
      position: relative;
    }
    .modal-main-image {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      border-radius: 12px;
      cursor: pointer;
    }
    .modal-thumbnails {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
      overflow-x: auto;
      padding-bottom: 0.5rem;
    }
    .modal-thumb {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.3s;
    }
    .modal-thumb.active {
      border-color: #C4A06A;
    }
    .modal-thumb:hover {
      transform: scale(1.05);
    }
    .modal-details h2 {
      color: #F5EDD8;
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .modal-category {
      color: #C4A06A;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
    .modal-price {
      font-size: 1.3rem;
      font-weight: 700;
      color: #C4A06A;
      margin-bottom: 1rem;
    }
    .modal-description {
      color: #A89880;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .modal-video {
      margin-top: 1rem;
    }
    .modal-video video {
      width: 100%;
      border-radius: 12px;
    }
    .contact-btn {
      background: #C4A06A;
      color: #1A1510;
      padding: 0.8rem 1.5rem;
      border: none;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1rem;
    }
    .contact-btn:hover {
      background: #D4B896;
      transform: translateY(-2px);
    }

    /* Loader */
    .loader-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 400px;
    }
    .loader {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(196,160,106,0.3);
      border-radius: 50%;
      border-top-color: #C4A06A;
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
    }
    .empty-state i {
      font-size: 4rem;
      color: #C4A06A;
      margin-bottom: 1rem;
      opacity: 0.5;
    }
    .empty-state p {
      color: #A89880;
      font-size: 1rem;
    }

    /* Footer */
    #footer-container {
      margin-top: auto;
    }

    @media (max-width: 768px) {
      .filters-container {
        flex-direction: column;
        align-items: stretch;
      }
      .filter-group {
        justify-content: center;
      }
      .products-grid {
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 1rem;
      }
      .modal-content {
        grid-template-columns: 1fr;
        gap: 1rem;
        padding: 1rem;
      }
      .product-modal {
        max-height: 85vh;
      }
    }
  </style>
</head>
<body>

  <div id="header-container"></div>

  <div class="main-content">
    <!-- Hero Section -->
    <div class="hero-section">
      <h1><i class="fas fa-tshirt"></i> تشكيلتنا</h1>
      <p>اكتشفوا أحدث تصاميم الجلابيات المغربية الأصيلة والعصرية</p>
    </div>

    <!-- Filters Section -->
    <div class="filters-section">
      <div class="filters-container">
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="ابحث عن منتج..." onkeyup="filterProducts()">
        </div>
        <div class="filter-group">
          <select id="categoryFilter" class="filter-select" onchange="filterProducts()">
            <option value="">كل الفئات</option>
          </select>
          <select id="sortFilter" class="filter-select" onchange="filterProducts()">
            <option value="default">الترتيب الافتراضي</option>
            <option value="price_asc">السعر: من الأقل للأعلى</option>
            <option value="price_desc">السعر: من الأعلى للأقل</option>
            <option value="name_asc">الاسم: أ-ي</option>
            <option value="name_desc">الاسم: ي-أ</option>
          </select>
          <button class="filter-select" onclick="resetFilters()" style="background:#C4A06A;color:#1A1510;">
            <i class="fas fa-redo"></i> إعادة ضبط
          </button>
        </div>
        <div class="products-count" id="productsCount">0 منتج</div>
      </div>
    </div>

    <!-- Products Grid -->
    <div class="products-container">
      <div class="products-grid" id="productsGrid">
        <div class="loader-container">
          <div class="loader"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Product Modal -->
  <div class="modal-overlay" id="productModal">
    <div class="product-modal">
      <button class="modal-close" onclick="closeModal()">
        <i class="fas fa-times"></i>
      </button>
      <div class="modal-content" id="modalContent">
        <!-- سيتم تعبئته ديناميكياً -->
      </div>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="header.js"></script>
  <script src="footer.js"></script>

  <script>
    let allProducts = [];
    let categories = [];

    // Supabase Request
    async function supabaseRequest(endpoint, opts = {}) {
      const url = `${CONFIG.SUPABASE_URL}${endpoint}`;
      const fetchOpts = {
        method: opts.method || 'GET',
        headers: {
          'apikey': CONFIG.SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${CONFIG.SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json'
        }
      };
      
      if (opts.body) {
        fetchOpts.body = JSON.stringify(opts.body);
      }
      
      const res = await fetch(url, fetchOpts);
      
      if (res.status === 204) return null;
      
      const text = await res.text();
      
      if (!text) {
        if (res.ok) return null;
        throw new Error(`خطأ ${res.status}`);
      }
      
      try {
        const data = JSON.parse(text);
        if (!res.ok) throw new Error(data.message || `خطأ ${res.status}`);
        return data;
      } catch(e) {
        if (!res.ok) throw new Error(`خطأ ${res.status}`);
        return text;
      }
    }

    // Load Categories
    async function loadCategories() {
      try {
        const cats = await supabaseRequest('/rest/v1/cat_overlay?select=category_name&is_active=eq.true&order=display_order');
        if (cats && cats.length) {
          categories = cats.map(c => c.category_name);
          const categorySelect = document.getElementById('categoryFilter');
          cats.forEach(cat => {
            categorySelect.innerHTML += `<option value="${escapeHtml(cat.category_name)}">${escapeHtml(cat.category_name)}</option>`;
          });
        }
      } catch(e) {
        console.error('Error loading categories:', e);
      }
    }

    // Load Products
    async function loadProducts() {
      try {
        const products = await supabaseRequest('/rest/v1/products?select=*&is_active=eq.true&order=display_order');
        allProducts = products || [];
        filterProducts();
      } catch(e) {
        console.error('Error loading products:', e);
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1;">
            <i class="fas fa-exclamation-circle"></i>
            <p>حدث خطأ في تحميل المنتجات</p>
          </div>
        `;
      }
    }

    // Escape HTML
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    // Filter Products
    function filterProducts() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const category = document.getElementById('categoryFilter').value;
      const sortBy = document.getElementById('sortFilter').value;
      
      let filtered = [...allProducts];
      
      // Filter by search
      if (searchTerm) {
        filtered = filtered.filter(p => 
          p.product_name.toLowerCase().includes(searchTerm) ||
          (p.product_description && p.product_description.toLowerCase().includes(searchTerm))
        );
      }
      
      // Filter by category
      if (category) {
        filtered = filtered.filter(p => p.category_name === category);
      }
      
      // Sort
      switch(sortBy) {
        case 'price_asc':
          filtered.sort((a, b) => {
            const priceA = extractPrice(a.price_range);
            const priceB = extractPrice(b.price_range);
            return priceA - priceB;
          });
          break;
        case 'price_desc':
          filtered.sort((a, b) => {
            const priceA = extractPrice(a.price_range);
            const priceB = extractPrice(b.price_range);
            return priceB - priceA;
          });
          break;
        case 'name_asc':
          filtered.sort((a, b) => a.product_name.localeCompare(b.product_name, 'ar'));
          break;
        case 'name_desc':
          filtered.sort((a, b) => b.product_name.localeCompare(a.product_name, 'ar'));
          break;
        default:
          filtered.sort((a, b) => (a.display_order || 0) - (b.display_order || 0));
      }
      
      // Update count
      document.getElementById('productsCount').textContent = `${filtered.length} منتج`;
      
      // Render products
      renderProducts(filtered);
    }
    
    // Extract price from range string
    function extractPrice(priceRange) {
      if (!priceRange) return 0;
      const match = priceRange.match(/(\d+)/);
      return match ? parseInt(match[0]) : 0;
    }
    
    // Render Products
    function renderProducts(products) {
      const grid = document.getElementById('productsGrid');
      
      if (!products.length) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1;">
            <i class="fas fa-box-open"></i>
            <p>لا توجد منتجات متاحة حالياً</p>
          </div>
        `;
        return;
      }
      
      grid.innerHTML = products.map(product => `
        <div class="product-card" onclick="openModal(${product.id})">
          <div class="product-image">
            <img src="${product.product_image_url || 'https://placehold.co/400x500/2A2218/C4A06A'}" 
                 alt="${escapeHtml(product.product_name)}"
                 onerror="this.src='https://placehold.co/400x500/2A2218/C4A06A'">
            ${product.is_featured ? '<div class="product-badge featured"><i class="fas fa-star"></i> مميز</div>' : ''}
            <div class="product-overlay">
              <button class="quick-view"><i class="fas fa-eye"></i> عرض التفاصيل</button>
            </div>
          </div>
          <div class="product-info">
            <div class="product-category">${escapeHtml(product.category_name)}</div>
            <div class="product-title">${escapeHtml(product.product_name)}</div>
            <div class="product-price">${escapeHtml(product.price_range) || 'اتصل بنا للسعر'}</div>
            ${product.product_description ? `<div class="product-description">${escapeHtml(product.product_description.substring(0, 100))}${product.product_description.length > 100 ? '...' : ''}</div>` : ''}
          </div>
        </div>
      `).join('');
    }
    
    // Open Modal
    window.openModal = async function(productId) {
      const product = allProducts.find(p => p.id === productId);
      if (!product) return;
      
      const allImages = [product.product_image_url, ...(product.additional_images || [])].filter(img => img);
      const modalContent = document.getElementById('modalContent');
      
      modalContent.innerHTML = `
        <div class="modal-gallery">
          <img id="modalMainImage" src="${allImages[0] || 'https://placehold.co/600x600/2A2218/C4A06A'}" 
               alt="${escapeHtml(product.product_name)}"
               class="modal-main-image"
               onclick="openImageInNewTab('${allImages[0]}')">
          ${allImages.length > 1 ? `
            <div class="modal-thumbnails" id="modalThumbnails">
              ${allImages.map((img, idx) => `
                <img src="${img}" class="modal-thumb ${idx === 0 ? 'active' : ''}" 
                     onclick="changeMainImage('${img}', this)">
              `).join('')}
            </div>
          ` : ''}
        </div>
        <div class="modal-details">
          <h2>${escapeHtml(product.product_name)}</h2>
          <div class="modal-category"><i class="fas fa-tag"></i> ${escapeHtml(product.category_name)}</div>
          ${product.price_range ? `<div class="modal-price">${escapeHtml(product.price_range)}</div>` : ''}
          ${product.product_description ? `<div class="modal-description">${escapeHtml(product.product_description)}</div>` : ''}
          ${product.product_video_url ? `
            <div class="modal-video">
              <video controls src="${product.product_video_url}"></video>
            </div>
          ` : ''}
          <button class="contact-btn" onclick="contactUs()">
            <i class="fab fa-whatsapp"></i> تواصل معنا للشراء
          </button>
        </div>
      `;
      
      document.getElementById('productModal').classList.add('active');
      document.body.style.overflow = 'hidden';
    };
    
    // Change main image in modal
    window.changeMainImage = function(imgUrl, element) {
      const mainImg = document.getElementById('modalMainImage');
      if (mainImg) mainImg.src = imgUrl;
      
      document.querySelectorAll('.modal-thumb').forEach(thumb => thumb.classList.remove('active'));
      element.classList.add('active');
    };
    
    // Open image in new tab
    window.openImageInNewTab = function(imgUrl) {
      if (imgUrl) window.open(imgUrl, '_blank');
    };
    
    // Close modal
    window.closeModal = function() {
      document.getElementById('productModal').classList.remove('active');
      document.body.style.overflow = '';
    };
    
    // Contact us
    window.contactUs = function() {
      const whatsappNumber = CONFIG.WHATSAPP_NUMBER || '212600000000';
      const message = encodeURIComponent('السلام عليكم، أرغب في الاستفسار عن منتجاتكم');
      window.open(`https://wa.me/${whatsappNumber}?text=${message}`, '_blank');
    };
    
    // Reset filters
    window.resetFilters = function() {
      document.getElementById('searchInput').value = '';
      document.getElementById('categoryFilter').value = '';
      document.getElementById('sortFilter').value = 'default';
      filterProducts();
    };
    
    // Filter on input
    window.filterProducts = filterProducts;
    
    // Close modal on escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });
    
    // Close modal on overlay click
    document.getElementById('productModal').addEventListener('click', (e) => {
      if (e.target.id === 'productModal') closeModal();
    });
    
    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
      await loadCategories();
