<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم | Almaya Couture</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Tajawal', 'Cairo', sans-serif; background: #1A1510; color: #E8DDD0; }
    .admin-header { background: rgba(26,21,16,0.95); backdrop-filter: blur(12px); border-bottom: 2px solid #C4A06A; padding: 1rem 2rem; margin-bottom: 2rem; }
    .header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    .admin-container { max-width: 1400px; margin: 0 auto; padding: 0 2rem 2rem; }
    .tab-btn { padding: 0.75rem 2rem; border: 1px solid #C4A06A; background: transparent; color: #C4A06A; cursor: pointer; border-radius: 8px; transition: all 0.3s; font-size: 1rem; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; }
    .tab-btn:hover { background: rgba(196,160,106,0.1); }
    .tab-btn.active { background: #C4A06A; color: #1A1510; font-weight: bold; }
    .btn-test { padding: 0.75rem 1.5rem; background: #17a2b8; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    .card { background: #2A2218; border: 1px solid rgba(196,160,106,0.2); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; overflow-x: auto; }
    .btn-primary { background: #C4A06A; color: #1A1510; padding: 0.75rem 1.5rem; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
    .btn-danger { background: #dc3545; color: white; padding: 0.5rem 0.75rem; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .btn-edit { background: #C4A06A; color: #1A1510; padding: 0.5rem 0.75rem; border: none; border-radius: 6px; cursor: pointer; margin-left: 0.5rem; font-size: 0.85rem; }
    .input-field { width: 100%; padding: 0.75rem; background: #1A1510; border: 1px solid rgba(196,160,106,0.3); border-radius: 8px; color: #E8DDD0; margin-bottom: 1rem; font-family: inherit; }
    .input-field:focus { outline: none; border-color: #C4A06A; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.75rem; text-align: right; border-bottom: 1px solid rgba(196,160,106,0.1); }
    th { color: #C4A06A; font-weight: bold; background: rgba(196,160,106,0.05); white-space: nowrap; }
    img.preview { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid rgba(196,160,106,0.2); }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
    .modal.active { display: flex; }
    .modal-content { background: #2A2218; border: 1px solid #C4A06A; border-radius: 16px; padding: 2rem; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
    .notification { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 1rem 2rem; border-radius: 8px; z-index: 2000; animation: slideDown 0.3s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .notification.success { background: #28a745; color: white; }
    .notification.error { background: #dc3545; color: white; }
    .notification.info { background: #17a2b8; color: white; }
    @keyframes slideDown { from { transform: translateX(-50%) translateY(-100%); } to { transform: translateX(-50%) translateY(0); } }
    .status-badge { padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
    .status-active { background: rgba(40,167,69,0.2); color: #28a745; }
    .status-inactive { background: rgba(220,53,69,0.2); color: #dc3545; }
    .empty-state { text-align: center; padding: 3rem; color: #A89880; }
    .empty-state i { font-size: 3rem; margin-bottom: 1rem; color: #C4A06A; }
    @media (max-width: 768px) { .header-content { flex-direction: column; gap: 1rem; } .tab-btn { padding: 0.5rem 1rem; font-size: 0.85rem; } }
  </style>
</head>
<body>

<header class="admin-header">
  <div class="header-content">
    <div style="display: flex; align-items: center; gap: 1rem;">
      <i class="fas fa-crown" style="color: #C4A06A; font-size: 1.8rem;"></i>
      <div>
        <h1 style="font-size: 1.5rem; color: #F5EDD8; margin: 0;">🎛️ لوحة التحكم</h1>
        <p style="font-size: 0.7rem; color: #C4A06A; letter-spacing: 2px;">ALMAYA COUTURE ADMIN</p>
      </div>
    </div>
    <div style="display: flex; gap: 0.75rem; flex-wrap: wrap;">
      <button class="tab-btn active" onclick="switchTab('slider')"><i class="fas fa-images"></i> السلايدر</button>
      <button class="tab-btn" onclick="switchTab('categories')"><i class="fas fa-th-large"></i> التصنيفات</button>
      <button class="btn-test" onclick="testConnection()"><i class="fas fa-plug"></i> اختبار</button>
      <a href="index.html" class="tab-btn"><i class="fas fa-eye"></i> معاينة</a>
    </div>
  </div>
</header>

<main class="admin-container">
  <div id="sliderTab">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
      <h2 style="font-size: 1.3rem;">📸 إدارة السلايدر</h2>
      <button class="btn-primary" onclick="openModal('slider')"><i class="fas fa-plus"></i> إضافة سلايد جديد</button>
    </div>
    <div id="sliderList" class="card"><div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>جاري التحميل...</p></div></div>
  </div>
  <div id="categoriesTab" style="display: none;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
      <h2 style="font-size: 1.3rem;">🏷️ إدارة التصنيفات</h2>
      <button class="btn-primary" onclick="openModal('category')"><i class="fas fa-plus"></i> إضافة تصنيف جديد</button>
    </div>
    <div id="categoriesList" class="card"><div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>جاري التحميل...</p></div></div>
  </div>
</main>

<div class="modal" id="editModal"><div class="modal-content" id="modalContent"></div></div>

<script src="header.js"></script>
<script src="footer.js"></script>

<script>
// ===== SUPABASE CLIENT واحد فقط =====
if (!window._adminSupabase) {
  window._adminSupabase = window.supabase.createClient(
    'https://ieiujnrgrfsqajcgdiys.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllaXVqbnJncmZzcWFxY2dkaXlzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNDc5MTEsImV4cCI6MjA5NDcyMzkxMX0.ad0ui5P37W-kNaiQk2EYxQv3iA3tWOzHICSNW_VTdvE',
    { auth: { persistSession: false } }
  );
}
const supabase = window._adminSupabase;

let currentTab = 'slider';

async function testConnection() {
  showNotification('🔄 جاري اختبار الاتصال...', 'info');
  try {
    const { data, error } = await supabase.from('slider').select('count', { count: 'exact', head: true });
    if (error) throw error;
    showNotification('✅ الاتصال ناجح! Supabase خدام 🎉', 'success');
  } catch (err) {
    showNotification('❌ فشل: ' + err.message, 'error');
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(btn => {
    if (btn.textContent.includes(tab === 'slider' ? 'السلايدر' : 'التصنيفات')) btn.classList.add('active');
  });
  document.getElementById('sliderTab').style.display = tab === 'slider' ? 'block' : 'none';
  document.getElementById('categoriesTab').style.display = tab === 'categories' ? 'block' : 'none';
  if (tab === 'slider') loadSlider(); else loadCategories();
}

async function loadSlider() {
  const listEl = document.getElementById('sliderList');
  listEl.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>جاري التحميل...</p></div>';
  
  try {
    const { data, error } = await supabase.from('slider').select('*').order('sort_order');
    if (error) throw error;
    
    if (!data || data.length === 0) {
      listEl.innerHTML = '<div class="empty-state"><i class="fas fa-image"></i><p>لا توجد سلايدرات</p></div>';
      return;
    }
    
    let html = `<table><thead><tr><th>#</th><th>صورة</th><th>العنوان</th><th>الوصف</th><th>ترتيب</th><th>حالة</th><th>إجراءات</th></tr></thead><tbody>`;
    
    data.forEach(item => {
      html += `<tr>
        <td>${item.id}</td>
        <td><img src="${item.image_url}" class="preview" onerror="this.src='https://placehold.co/60/2A2218/C4A06A?text=No'"></td>
        <td><strong>${item.title_ar}</strong></td>
        <td>${item.subtitle_ar?.substring(0, 60) || '-'}...</td>
        <td>${item.sort_order}</td>
        <td><span class="status-badge ${item.is_active ? 'status-active' : 'status-inactive'}">${item.is_active ? '✅ نشط' : '❌ غير نشط'}</span></td>
        <td>
          <button class="btn-edit" onclick="editItem('slider', ${item.id})"><i class="fas fa-edit"></i></button>
          <button class="btn-danger" onclick="deleteItem('slider', ${item.id})"><i class="fas fa-trash"></i></button>
        </td>
      </tr>`;
    });
    
    html += '</tbody></table>';
    listEl.innerHTML = html;
  } catch (err) {
    listEl.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>خطأ: ${err.message}</p></div>`;
  }
}

async function loadCategories() {
  const listEl = document.getElementById('categoriesList');
  listEl.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>جاري التحميل...</p></div>';
  
  try {
    const { data, error } = await supabase.from('categories').select('*').order('sort_order');
    if (error) throw error;
    
    if (!data || data.length === 0) {
      listEl.innerHTML = '<div class="empty-state"><i class="fas fa-folder-open"></i><p>لا توجد تصنيفات</p></div>';
      return;
    }
    
    let html = `<table><thead><tr><th>#</th><th>صورة</th><th>الاسم</th><th>فرعي</th><th>وصف</th><th>ترتيب</th><th>إجراءات</th></tr></thead><tbody>`;
    
    data.forEach(item => {
      html += `<tr>
        <td>${item.id}</td>
        <td><img src="${item.image_url}" class="preview" onerror="this.src='https://placehold.co/60/2A2218/C4A06A?text=No'"></td>
        <td><strong>${item.name_ar}</strong></td>
        <td>${item.subtitle_ar || '-'}</td>
        <td>${item.description_ar?.substring(0, 40) || '-'}...</td>
        <td>${item.sort_order}</td>
        <td>
          <button class="btn-edit" onclick="editItem('category', ${item.id})"><i class="fas fa-edit"></i></button>
          <button class="btn-danger" onclick="deleteItem('category', ${item.id})"><i class="fas fa-trash"></i></button>
        </td>
      </tr>`;
    });
    
    html += '</tbody></table>';
    listEl.innerHTML = html;
  } catch (err) {
    listEl.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>خطأ: ${err.message}</p></div>`;
  }
}

function openModal(type, id = null) {
  const modal = document.getElementById('editModal');
  const isEdit = id !== null;
  const title = isEdit ? 'تعديل' : 'إضافة';
  const label = type === 'slider' ? 'سلايد' : 'تصنيف';
  
  let formHTML = type === 'slider' ? `
    <form onsubmit="saveSlider(event, ${id || 'null'})">
      <label style="color:#C4A06A;display:block;margin-bottom:0.25rem;">العنوان *</label>
      <input type="text" id="title_ar" class="input-field" required>
      <label style="color:#C4A06A;display:block;margin-bottom:0.25rem;">الوصف</label>
      <textarea id="subtitle_ar" class="input-field" rows="2"></textarea>
      <label style="color:#C4A06A;display:block;margin-bottom:0.25rem;">رابط الصورة *</label>
      <input type="text" id="image_url" class="input-field" required>
      <label style="color:#C4A06A;display:block;margin-bottom:0.25rem;">نص الزر</label>
      <input type="text" id="button_text_ar" class="input-field" value="اشتري الأن">
      <label style="color:#C4A06A;display:block;margin-bottom:0.25rem;">الرابط</label>
      <input type="text" id="link_url" class="input-field">
      <label style="color:#C4A06A;display:block;margin-bottom:0.25rem;">الترتيب</label>
      <input type="number" id="sort_order" class="input-field" value="0">
      <label style="display:flex;align-items:center;gap:0.5rem;margin:1rem 0;"><input type="checkbox" id="is_active" checked> نشط</label>
      <div style="display:flex;gap:1rem;"><button type="submit" class="btn-primary">💾 حفظ</button><button type="button" class="btn-danger" onclick="closeModal()">إلغاء</button></div>
    </form>` : `
    <form onsubmit="saveCategory(event, ${id || 'null'})">
      <label style="color:#C4A06A;display:block;margin-bottom:0.25rem;">اسم التصنيف *</label>
      <input type="text" id="name_ar" class="input-field" required>
      <label style="color:#C4A06A;display:block;margin-bottom:0.25rem;">العنوان الفرعي</label>
      <input type="text" id="subtitle_ar" class="input-field">
      <label style="color:#C4A06A;display:block;margin-bottom:0.25rem;">الوصف</label>
      <textarea id="description_ar" class="input-field" rows="2"></textarea>
      <label style="color:#C4A06A;display:block;margin-bottom:0.25rem;">رابط الصورة</label>
      <input type="text" id="image_url" class="input-field">
      <label style="color:#C4A06A;display:block;margin-bottom:0.25rem;">الرابط</label>
      <input type="text" id="link_url" class="input-field">
      <label style="color:#C4A06A;display:block;margin-bottom:0.25rem;">الترتيب</label>
      <input type="number" id="sort_order" class="input-field" value="0">
      <label style="display:flex;align-items:center;gap:0.5rem;margin:1rem 0;"><input type="checkbox" id="is_active" checked> نشط</label>
      <div style="display:flex;gap:1rem;"><button type="submit" class="btn-primary">💾 حفظ</button><button type="button" class="btn-danger" onclick="closeModal()">إلغاء</button></div>
    </form>`;
  
  document.getElementById('modalContent').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
      <h3 style="color:#C4A06A;">${title} ${label}</h3>
      <button onclick="closeModal()" style="background:none;border:none;color:#A89880;cursor:pointer;font-size:1.5rem;">✕</button>
    </div>${formHTML}`;
  
  modal.classList.add('active');
  if (isEdit) loadItemData(type, id);
}

async function loadItemData(type, id) {
  const table = type === 'slider' ? 'slider' : 'categories';
  const { data, error } = await supabase.from(table).select('*').eq('id', id).single();
  if (error) { showNotification('❌ خطأ: ' + error.message, 'error'); return; }
  Object.keys(data).forEach(key => {
    const el = document.getElementById(key);
    if (el) {
      if (el.type === 'checkbox') el.checked = data[key];
      else el.value = data[key] || '';
    }
  });
}

async function saveSlider(event, id) {
  event.preventDefault();
  const data = {
    title_ar: document.getElementById('title_ar').value,
    subtitle_ar: document.getElementById('subtitle_ar').value,
    image_url: document.getElementById('image_url').value,
    button_text_ar: document.getElementById('button_text_ar').value || 'اشتري الأن',
    link_url: document.getElementById('link_url').value,
    sort_order: parseInt(document.getElementById('sort_order').value) || 0,
    is_active: document.getElementById('is_active').checked,
    updated_at: new Date()
  };
  let result = id ? await supabase.from('slider').update(data).eq('id', id) : await supabase.from('slider').insert([data]);
  if (result.error) showNotification('❌ خطأ: ' + result.error.message, 'error');
  else { showNotification('✅ تم الحفظ بنجاح!', 'success'); closeModal(); loadSlider(); }
}

async function saveCategory(event, id) {
  event.preventDefault();
  const data = {
    name_ar: document.getElementById('name_ar').value,
    subtitle_ar: document.getElementById('subtitle_ar').value,
    description_ar: document.getElementById('description_ar').value,
    image_url: document.getElementById('image_url').value,
    link_url: document.getElementById('link_url').value,
    sort_order: parseInt(document.getElementById('sort_order').value) || 0,
    is_active: document.getElementById('is_active').checked,
    updated_at: new Date()
  };
  let result = id ? await supabase.from('categories').update(data).eq('id', id) : await supabase.from('categories').insert([data]);
  if (result.error) showNotification('❌ خطأ: ' + result.error.message, 'error');
  else { showNotification('✅ تم الحفظ بنجاح!', 'success'); closeModal(); loadCategories(); }
}

function editItem(type, id) { openModal(type, id); }

async function deleteItem(type, id) {
  const label = type === 'slider' ? 'السلايد' : 'التصنيف';
  if (!confirm(`⚠️ هل أنت متأكد من حذف هذا ${label}؟`)) return;
  const table = type === 'slider' ? 'slider' : 'categories';
  const { error } = await supabase.from(table).delete().eq('id', id);
  if (error) showNotification('❌ خطأ: ' + error.message, 'error');
  else { showNotification('🗑️ تم الحذف بنجاح', 'success'); type === 'slider' ? loadSlider() : loadCategories(); }
}

function closeModal() { document.getElementById('editModal').classList.remove('active'); }

document.getElementById('editModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

function showNotification(message, type) {
  const existing = document.querySelector('.notification');
  if (existing) existing.remove();
  const notification = document.createElement('div');
  notification.className = `notification ${type}`;
  notification.textContent = message;
  document.body.appendChild(notification);
  setTimeout(() => notification.remove(), 3000);
}

window.addEventListener('DOMContentLoaded', () => {
  loadSlider();
  setTimeout(() => testConnection(), 500);
});
</script>

</body>
</html>
