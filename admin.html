<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم | Almaya Couture</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="config.js"></script>
  
  <style>
    /* ========== DARK THEME (Défaut) ========== */
    :root {
      --bg: #1A1510;
      --bg2: #0F0C09;
      --card: #2A2218;
      --gold: #C4A06A;
      --gold-light: #D4B896;
      --text: #F5EDD8;
      --text-secondary: #A89880;
      --border: rgba(196,160,106,0.15);
      --border-hover: rgba(196,160,106,0.3);
      --info: #3B82F6;
      --success: #25D366;
      --warning: #FFA502;
      --danger: #FF4757;
    }
    
    /* ========== WHITE THEME ========== */
    body.white-theme {
      --bg: #FDFCF8;
      --bg2: #F5F0E8;
      --card: #FFFFFF;
      --gold: #A07840;
      --gold-light: #C4A06A;
      --text: #2A2218;
      --text-secondary: #6B5F52;
      --border: rgba(160,120,64,0.15);
      --border-hover: rgba(160,120,64,0.3);
      --info: #3B82F6;
      --success: #25D366;
      --warning: #E67E00;
      --danger: #E74C3C;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 100%);
      font-family: 'Tajawal', sans-serif;
      color: var(--text);
      min-height: 100vh;
      transition: background-color 0.5s ease, color 0.5s ease;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

    #header-container { position: sticky; top: 0; z-index: 100; }

    .main-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* Header simple */
    .page-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .page-header .badge {
      display: inline-block;
      background: rgba(196,160,106,0.15);
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-size: 0.8rem;
      color: var(--gold);
      margin-bottom: 0.5rem;
      border: 1px solid var(--border);
    }
    .page-header h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text);
    }

    /* 4 stats mini en ligne */
    .mini-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    .mini-stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
      transition: all 0.3s;
    }
    .mini-stat:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
    }
    .mini-stat i {
      font-size: 1.2rem;
      color: var(--gold);
      margin-bottom: 0.3rem;
      display: block;
    }
    .mini-stat .value {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--text);
    }
    .mini-stat .label {
      font-size: 0.65rem;
      color: var(--text-secondary);
      margin-top: 0.1rem;
    }

    /* Liste des pages admin */
    .admin-menu {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .admin-menu-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1.2rem;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      color: var(--text);
    }
    .admin-menu-item:hover {
      border-color: var(--border-hover);
      background: rgba(196,160,106,0.05);
      transform: translateX(-5px);
    }
    .admin-menu-item .menu-icon {
      width: 45px;
      height: 45px;
      min-width: 45px;
      background: rgba(196,160,106,0.1);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: var(--gold);
      transition: all 0.3s;
    }
    .admin-menu-item:hover .menu-icon {
      background: rgba(196,160,106,0.2);
      transform: scale(1.1);
    }
    .admin-menu-item .menu-info {
      flex: 1;
    }
    .admin-menu-item .menu-title {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text);
      margin-bottom: 0.15rem;
    }
    .admin-menu-item .menu-desc {
      font-size: 0.7rem;
      color: var(--text-secondary);
    }
    .admin-menu-item .menu-badge {
      background: rgba(196,160,106,0.15);
      color: var(--gold);
      padding: 0.25rem 0.6rem;
      border-radius: 15px;
      font-size: 0.7rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .admin-menu-item .menu-badge.new {
      background: rgba(59,130,246,0.15);
      color: var(--info);
    }
    .admin-menu-item .menu-badge.pending {
      background: rgba(255,165,2,0.15);
      color: var(--warning);
    }
    .admin-menu-item .menu-arrow {
      color: var(--text-secondary);
      font-size: 0.8rem;
      transition: all 0.3s;
    }
    .admin-menu-item:hover .menu-arrow {
      color: var(--gold);
      transform: translateX(-3px);
    }

    /* Quick actions */
    .section-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
      margin: 2rem 0 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-title i { color: var(--gold); }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    
    .quick-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .quick-link {
      padding: 0.5rem 0.9rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-secondary);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      text-decoration: none;
    }
    .quick-link:hover {
      border-color: var(--gold);
      color: var(--gold);
      transform: translateY(-2px);
    }

    /* ========== THEME TOGGLE BUTTON ========== */
    .theme-toggle-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--card);
      border: 2px solid var(--border);
      color: var(--gold);
      font-size: 1.2rem;
      cursor: pointer;
      z-index: 99;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      backdrop-filter: blur(10px);
      animation: themePulse 2s ease-in-out infinite;
    }
    .theme-toggle-btn:hover {
      transform: scale(1.1) rotate(15deg);
      border-color: var(--gold);
      box-shadow: 0 6px 25px rgba(196,160,106,0.2);
    }
    .theme-toggle-btn:active { transform: scale(0.95); }
    
    body.white-theme .theme-toggle-btn {
      background: #FFFFFF;
      border-color: rgba(160, 120, 64, 0.3);
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }
    body.white-theme .theme-toggle-btn:hover {
      border-color: #A07840;
      box-shadow: 0 6px 25px rgba(160, 120, 64, 0.2);
    }
    
    @keyframes themePulse {
      0%, 100% { box-shadow: 0 4px 15px rgba(196,160,106,0.15); }
      50% { box-shadow: 0 4px 25px rgba(196,160,106,0.3); }
    }

    #footer-container { margin-top: 2rem; }

    /* Responsive */
    @media (max-width: 600px) {
      .mini-stats {
        grid-template-columns: repeat(2, 1fr);
      }
      .admin-menu-item {
        padding: 0.8rem 1rem;
      }
      .admin-menu-item .menu-icon {
        width: 38px;
        height: 38px;
        min-width: 38px;
        font-size: 1rem;
      }
      .admin-menu-item .menu-title {
        font-size: 0.85rem;
      }
      .theme-toggle-btn {
        bottom: 20px;
        right: 20px;
        width: 42px;
        height: 42px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <div id="header-container"></div>

  <div class="main-content">
    
    <!-- Header -->
    <div class="page-header">
      <div class="badge"><i class="fas fa-crown"></i> لوحة التحكم</div>
      <h1>Almaya Couture</h1>
    </div>

    <!-- Mini Stats -->
    <div class="mini-stats">
      <div class="mini-stat">
        <i class="fas fa-tshirt"></i>
        <div class="value" id="statProducts">0</div>
        <div class="label">منتجات</div>
      </div>
      <div class="mini-stat">
        <i class="fas fa-layer-group"></i>
        <div class="value" id="statCollections">0</div>
        <div class="label">مجموعات</div>
      </div>
      <div class="mini-stat">
        <i class="fas fa-clipboard-list"></i>
        <div class="value" id="statOrders">0</div>
        <div class="label">طلبات</div>
      </div>
      <div class="mini-stat">
        <i class="fas fa-star"></i>
        <div class="value" id="statReviews">0</div>
        <div class="label">آراء</div>
      </div>
    </div>

    <!-- Menu principal -->
    <div class="admin-menu">
      
      <!-- Produits -->
      <div class="admin-menu-item" onclick="navigateTo('admin-produits.html')">
        <div class="menu-icon"><i class="fas fa-tshirt"></i></div>
        <div class="menu-info">
          <div class="menu-title">إدارة المنتجات</div>
          <div class="menu-desc">إضافة، تعديل، حذف المنتجات والصور</div>
        </div>
        <span class="menu-badge" id="badgeProducts">0</span>
        <i class="fas fa-chevron-left menu-arrow"></i>
      </div>

      <!-- Collections -->
      <div class="admin-menu-item" onclick="navigateTo('admin-collections.html')">
        <div class="menu-icon"><i class="fas fa-layer-group"></i></div>
        <div class="menu-info">
          <div class="menu-title">إدارة المجموعات</div>
          <div class="menu-desc">إضافة، تعديل، حذف المجموعات والأقسام</div>
        </div>
        <span class="menu-badge" id="badgeCollections">0</span>
        <i class="fas fa-chevron-left menu-arrow"></i>
      </div>

      <!-- Commandes -->
      <div class="admin-menu-item" onclick="navigateTo('admin-orders.html')">
        <div class="menu-icon"><i class="fas fa-clipboard-list"></i></div>
        <div class="menu-info">
          <div class="menu-title">إدارة الطلبات</div>
          <div class="menu-desc">متابعة طلبات العملاء وتغيير حالتها</div>
        </div>
        <span class="menu-badge new" id="badgeNewOrders">0 جديد</span>
        <i class="fas fa-chevron-left menu-arrow"></i>
      </div>

      <!-- Avis -->
      <div class="admin-menu-item" onclick="navigateTo('admin-reviews.html')">
        <div class="menu-icon"><i class="fas fa-star"></i></div>
        <div class="menu-info">
          <div class="menu-title">إدارة الآراء</div>
          <div class="menu-desc">قبول، رفض، حذف آراء الزبائن</div>
        </div>
        <span class="menu-badge pending" id="badgePendingReviews">0 قيد الانتظار</span>
        <i class="fas fa-chevron-left menu-arrow"></i>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="section-title">
      <i class="fas fa-bolt"></i> إجراءات سريعة
    </div>
    <div class="quick-links">
      <button class="quick-link" onclick="navigateTo('admin-produits.html')">
        <i class="fas fa-plus-circle"></i> منتج جديد
      </button>
      <button class="quick-link" onclick="navigateTo('admin-collections.html')">
        <i class="fas fa-plus-circle"></i> مجموعة جديدة
      </button>
      <button class="quick-link" onclick="navigateTo('admin-orders.html')">
        <i class="fas fa-eye"></i> الطلبات الجديدة
      </button>
      <button class="quick-link" onclick="navigateTo('admin-reviews.html')">
        <i class="fas fa-check-circle"></i> مراجعة الآراء
      </button>
      <button class="quick-link" onclick="refreshStats()">
        <i class="fas fa-sync-alt"></i> تحديث
      </button>
      <button class="quick-link" onclick="window.open('/','_blank')">
        <i class="fas fa-globe"></i> زيارة الموقع
      </button>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="header.js"></script>
  <script src="footer.js"></script>

  <script>
    // ========== THEME TOGGLE ==========
    (function() {
      function createToggleButton() {
        if (document.querySelector('.theme-toggle-btn')) return;
        
        const btn = document.createElement('button');
        btn.className = 'theme-toggle-btn';
        btn.setAttribute('aria-label', 'تغيير السمة');
        btn.setAttribute('title', 'تغيير السمة (أبيض / أسود)');
        btn.innerHTML = '<i class="fas fa-moon"></i>';
        
        btn.addEventListener('click', function() {
          const isWhite = document.body.classList.contains('white-theme');
          if (isWhite) {
            document.body.classList.remove('white-theme');
            localStorage.setItem('almaya-theme', 'dark');
          } else {
            document.body.classList.add('white-theme');
            localStorage.setItem('almaya-theme', 'white');
          }
          updateButtonIcon();
        });
        
        document.body.appendChild(btn);
        updateButtonIcon();
      }

      function updateButtonIcon() {
        const btn = document.querySelector('.theme-toggle-btn');
        if (!btn) return;
        if (document.body.classList.contains('white-theme')) {
          btn.innerHTML = '<i class="fas fa-sun"></i>';
          btn.setAttribute('title', 'الوضع الداكن');
        } else {
          btn.innerHTML = '<i class="fas fa-moon"></i>';
          btn.setAttribute('title', 'الوضع الفاتح');
        }
      }

      function applySavedTheme() {
        const saved = localStorage.getItem('almaya-theme');
        if (saved === 'white') {
          document.body.classList.add('white-theme');
        } else if (saved === 'dark') {
          document.body.classList.remove('white-theme');
        }
      }

      applySavedTheme();
      createToggleButton();
      console.log('🎨 Theme toggle ready');
    })();

    if (typeof CONFIG === 'undefined') {
      document.body.innerHTML = '<div style="color:#FF4757;text-align:center;padding:2rem;">❌ CONFIG.js manquant !</div>';
      throw new Error('CONFIG missing');
    }

    const SUPABASE_URL = CONFIG.SUPABASE_URL;
    const SUPABASE_KEY = CONFIG.SUPABASE_ANON_KEY;

    async function supabaseRequest(endpoint) {
      const res = await fetch(`${SUPABASE_URL}${endpoint}`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json'
        }
      });
      if (res.status === 204) return null;
      const text = await res.text();
      if (!text) return [];
      return JSON.parse(text);
    }

    async function loadStats() {
      try {
        const products = await supabaseRequest('/rest/v1/products?select=id,is_active');
        const totalProducts = products ? products.length : 0;
        const activeProducts = products ? products.filter(p => p.is_active).length : 0;
        
        const collections = await supabaseRequest('/rest/v1/cat_overlay?select=id,is_active');
        const totalCollections = collections ? collections.length : 0;
        
        let totalOrders = 0, newOrders = 0;
        try {
          const orders = await supabaseRequest('/rest/v1/orders?select=id,status');
          if (orders) {
            totalOrders = orders.length;
            newOrders = orders.filter(o => o.status === 'new').length;
          }
        } catch(e) {}
        
        let totalReviews = 0, pendingReviews = 0;
        try {
          const reviews = await supabaseRequest('/rest/v1/reviews?select=id,is_approved');
          if (reviews) {
            totalReviews = reviews.length;
            pendingReviews = reviews.filter(r => !r.is_approved).length;
          }
        } catch(e) {}
        
        document.getElementById('statProducts').textContent = totalProducts;
        document.getElementById('statCollections').textContent = totalCollections;
        document.getElementById('statOrders').textContent = totalOrders;
        document.getElementById('statReviews').textContent = totalReviews;
        
        document.getElementById('badgeProducts').textContent = activeProducts + ' نشط';
        document.getElementById('badgeCollections').textContent = totalCollections;
        document.getElementById('badgeNewOrders').textContent = newOrders + ' جديد';
        document.getElementById('badgePendingReviews').textContent = pendingReviews + ' قيد الانتظار';
        
      } catch(e) {
        console.error('Erreur stats:', e);
      }
    }

    function navigateTo(page) {
      window.location.href = page;
    }

    function refreshStats() {
      loadStats();
      const btn = event.target;
      const originalHTML = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-check"></i> تم التحديث';
      btn.style.color = '#25D366';
      btn.style.borderColor = '#25D366';
      setTimeout(() => {
        btn.innerHTML = originalHTML;
        btn.style.color = '';
        btn.style.borderColor = '';
      }, 2000);
    }

    window.navigateTo = navigateTo;
    window.refreshStats = refreshStats;

    document.addEventListener('DOMContentLoaded', () => {
      loadStats();
      
      document.querySelectorAll('.admin-menu-item').forEach((item, i) => {
        item.style.opacity = '0';
        item.style.transform = 'translateX(20px)';
        item.style.animation = `slideIn 0.4s ease ${i * 0.1}s forwards`;
      });
      
      const style = document.createElement('style');
      style.textContent = `@keyframes slideIn { to { opacity:1; transform:translateX(0); } }`;
      document.head.appendChild(style);
    });
  </script>
</body>
</html>
