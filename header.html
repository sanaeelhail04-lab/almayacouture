<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap');

  :root {
    --gold:       #C4A06A;
    --gold-light: #D4B896;
    --gold-dim:   rgba(196,160,106,0.15);
    --bg:         #1A1510;
    --text:       #E8DDD0;
    --text-muted: #A89880;
  }

  .almaya-nav {
    background: rgba(26,21,16,0.92);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(196,160,106,0.15);
    position: sticky;
    top: 0;
    z-index: 999;
    font-family: 'Tajawal', sans-serif;
    direction: rtl;
    transition: background 0.3s;
  }

  .almaya-nav.scrolled {
    background: rgba(26,21,16,0.98);
    box-shadow: 0 4px 30px rgba(0,0,0,0.4);
  }

  .almaya-nav__inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0.9rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1.5rem;
  }

  /* ── Logo ── */
  .almaya-nav__logo {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    text-decoration: none;
    flex-shrink: 0;
  }

  .almaya-nav__logo-img {
    height: 48px;
    width: auto;
    border-radius: 6px;
    transition: transform 0.3s;
  }

  .almaya-nav__logo:hover .almaya-nav__logo-img {
    transform: scale(1.04);
  }

  .almaya-nav__brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-weight: 300;
    font-style: italic;
    color: var(--gold);
    letter-spacing: 1.5px;
    white-space: nowrap;
  }

  /* ── Desktop Links ── */
  .almaya-nav__links {
    display: flex;
    align-items: center;
    gap: 2.5rem;
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .almaya-nav__links a {
    font-family: 'Tajawal', sans-serif;
    color: var(--gold-light);
    text-decoration: none;
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    position: relative;
    padding-bottom: 3px;
    transition: color 0.3s;
  }

  .almaya-nav__links a::after {
    content: '';
    position: absolute;
    bottom: 0;
    right: 0;
    width: 0;
    height: 1px;
    background: var(--gold);
    transition: width 0.3s ease;
  }

  .almaya-nav__links a:hover,
  .almaya-nav__links a.active {
    color: var(--gold);
  }

  .almaya-nav__links a:hover::after,
  .almaya-nav__links a.active::after {
    width: 100%;
    right: auto;
    left: 0;
  }

  /* ── Hamburger ── */
  .almaya-nav__burger {
    display: none;
    flex-direction: column;
    justify-content: center;
    gap: 5px;
    width: 36px;
    height: 36px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(196,160,106,0.2);
    border-radius: 8px;
    cursor: pointer;
    padding: 6px 8px;
    transition: background 0.3s, border-color 0.3s;
  }

  .almaya-nav__burger:hover {
    background: var(--gold-dim);
    border-color: rgba(196,160,106,0.4);
  }

  .almaya-nav__burger span {
    display: block;
    width: 100%;
    height: 1.5px;
    background: var(--gold-light);
    border-radius: 2px;
    transition: transform 0.35s ease, opacity 0.35s ease;
    transform-origin: center;
  }

  .almaya-nav__burger.open span:nth-child(1) {
    transform: translateY(6.5px) rotate(45deg);
  }
  .almaya-nav__burger.open span:nth-child(2) {
    opacity: 0;
    transform: scaleX(0);
  }
  .almaya-nav__burger.open span:nth-child(3) {
    transform: translateY(-6.5px) rotate(-45deg);
  }

  /* ── Mobile Menu ── */
  .almaya-nav__mobile {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.45s cubic-bezier(0.23,1,0.32,1), opacity 0.35s;

    border-top: 1px solid transparent;
    background: rgba(26,21,16,0.97);
  }

  .almaya-nav__mobile.open {
    max-height: 300px;
    opacity: 1;
    border-top-color: rgba(196,160,106,0.1);
  }

  .almaya-nav__mobile ul {
    list-style: none;
    margin: 0;
    padding: 0.5rem 1.5rem 1.25rem;
    display: flex;
    flex-direction: column;
  }

  .almaya-nav__mobile ul li a {
    display: block;
    padding: 0.85rem 0;
    color: var(--gold-light);
    text-decoration: none;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    border-bottom: 1px solid rgba(196,160,106,0.07);
    transition: color 0.3s, padding-right 0.3s;
  }

  .almaya-nav__mobile ul li:last-child a {
    border-bottom: none;
  }

  .almaya-nav__mobile ul li a:hover,
  .almaya-nav__mobile ul li a.active {
    color: var(--gold);
    padding-right: 6px;
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .almaya-nav__inner {
      padding: 0.75rem 1rem;
    }

    .almaya-nav__links {
      display: none;

    .almaya-nav__brand {

    .almaya-nav__logo-img {

    }

    .almaya-nav__burger {
      display: flex;
    }
  }

  @media (max-width: 480px) {
    .almaya-nav__inner {
      padding: 0.65rem 0.75rem;

    .almaya-nav__logo-img {
      height: 36px;
    }
  }
</style>

<script>
  (function () {
    const currentPage = location.pathname.split('/').pop().replace('.html', '') || 'index';
    document.querySelectorAll('.almaya-nav [data-page]').forEach(link => {
      if (link.dataset.page === currentPage) link.classList.add('active');
    });

    const burger = document.getElementById('almayaBurger');
    const mobileMenu = document.getElementById('almayaMobile');

    burger.addEventListener('click', () => {
      const isOpen = burger.classList.toggle('open');
      mobileMenu.classList.toggle('open', isOpen);
      burger.setAttribute('aria-expanded', isOpen);
    });

    mobileMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        burger.classList.remove('open');
        mobileMenu.classList.remove('open');
        burger.setAttribute('aria-expanded', false);
      });
    });

    document.addEventListener('click', (e) => {
      if (!document.getElementById('almayaNav').contains(e.target)) {
        burger.classList.remove('open');
        mobileMenu.classList.remove('open');
      }
    });

    const nav = document.getElementById('almayaNav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 30);
    }, { passive: true });
  })();
</script>
