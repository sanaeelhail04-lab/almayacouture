<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | Almaya Couture</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #C4A06A;
            --gold-light: #D4B896;
            --bg: #1A1510;
            --bg-light: #231E16;
            --text: #E8DDD0;
            --text-muted: #A89880;
            --error: #C45A4A;
            --border: rgba(196,160,106,0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .login-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: radial-gradient(ellipse at top, rgba(196,160,106,0.05) 0%, transparent 70%);
        }

        .login-card {
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 440px;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: var(--gold);
            border-radius: 0 0 4px 4px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-icon {
            width: 70px;
            height: 70px;
            margin: 0 auto 1.5rem;
            background: rgba(196,160,106,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(196,160,106,0.3);
        }

        .login-icon svg {
            width: 32px;
            height: 32px;
            stroke: var(--gold);
        }

        .login-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 300;
            color: var(--gold);
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 300;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--gold-light);
            margin-bottom: 0.5rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            stroke: var(--text-muted);
            transition: stroke 0.3s;
        }

        .form-input {
            width: 100%;
            padding: 0.85rem 2.8rem 0.85rem 1rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            font-size: 0.9rem;
            transition: all 0.3s;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--gold);
            background: rgba(196,160,106,0.05);
            box-shadow: 0 0 0 3px rgba(196,160,106,0.1);
        }

        .form-input::placeholder {
            color: rgba(168,152,128,0.5);
            font-size: 0.85rem;
        }

        .password-toggle {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
        }

        .password-toggle svg {
            width: 18px;
            height: 18px;
            stroke: var(--text-muted);
            transition: stroke 0.3s;
        }

        .password-toggle:hover svg {
            stroke: var(--gold);
        }

        .login-btn {
            width: 100%;
            padding: 0.9rem;
            background: var(--gold);
            color: var(--bg);
            border: none;
            border-radius: 8px;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            margin-top: 0.5rem;
        }

        .login-btn:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(196,160,106,0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .alert {
            padding: 0.8rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .alert-error {
            background: rgba(196,90,74,0.15);
            border: 1px solid rgba(196,90,74,0.3);
            color: #E8A090;
        }

        .alert-success {
            background: rgba(106,191,105,0.15);
            border: 1px solid rgba(106,191,105,0.3);
            color: #90D48F;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 2rem 1.5rem;
                border-radius: 12px;
            }

            .login-title {
                font-size: 1.7rem;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div id="header-placeholder"></div>

    <!-- Contenu principal -->
    <div class="login-container">
        <div class="login-card">
            
            <!-- Header -->
            <div class="login-header">
                <div class="login-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <h1 class="login-title">تسجيل الدخول</h1>
                <p class="login-subtitle">مرحباً بعودتك إلى عالم المجد</p>
            </div>

            <!-- Message d'erreur -->
            <div class="alert alert-error" id="errorAlert">
                <span id="errorMessage">البريد الإلكتروني أو كلمة المرور غير صحيحة</span>
            </div>

            <!-- Formulaire -->
            <form id="loginForm" novalidate>
                
                <!-- Email -->
                <div class="form-group">
                    <label class="form-label" for="email">البريد الإلكتروني</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        <input 
                            type="email" 
                            id="email" 
                            class="form-input" 
                            placeholder="exemple@email.com"
                            dir="ltr"
                            required
                            autocomplete="email"
                        >
                    </div>
                </div>

                <!-- Mot de passe -->
                <div class="form-group">
                    <label class="form-label" for="password">كلمة المرور</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input 
                            type="password" 
                            id="password" 
                            class="form-input" 
                            placeholder="••••••••"
                            dir="ltr"
                            required
                            autocomplete="current-password"
                        >
                        <button type="button" class="password-toggle" id="togglePassword" aria-label="إظهار كلمة المرور">
                            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Bouton -->
                <button type="submit" class="login-btn" id="loginBtn">
                    دخول
                </button>

            </form>

        </div>
    </div>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="header.js"></script>
    
    <script>
        // ========== GESTION LOGIN SIMPLE ==========
        document.addEventListener('DOMContentLoaded', function() {
            
            const loginForm = document.getElementById('loginForm');
            const errorAlert = document.getElementById('errorAlert');
            const errorMessage = document.getElementById('errorMessage');
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');

            // Toggle password visibility
            togglePassword.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                if (type === 'text') {
                    eyeIcon.innerHTML = `
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                        <line x1="1" y1="1" x2="23" y2="23"></line>
                    `;
                } else {
                    eyeIcon.innerHTML = `
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    `;
                }
            });

            // Soumission du formulaire
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                // Cacher l'erreur
                errorAlert.style.display = 'none';

                // Récupérer les valeurs
                const email = document.getElementById('email').value.trim();
                const password = passwordInput.value;

                // Vérifier les identifiants
                if (email === 'almayacouture@gmail.com' && password === '123456') {
                    // ✅ SUCCÈS - Redirection vers admin.html
                    window.location.href = 'admin.html';
                } else {
                    // ❌ ERREUR - Afficher message
                    errorMessage.textContent = 'البريد الإلكتروني أو كلمة المرور غير صحيحة';
                    errorAlert.style.display = 'block';
                    
                    // Secouer le formulaire
                    loginForm.style.animation = 'none';
                    loginForm.offsetHeight;
                    loginForm.style.animation = 'shake 0.5s ease';
                }
            });

            // Animation shake pour erreur
            const shakeStyle = document.createElement('style');
            shakeStyle.textContent = `
                @keyframes shake {
                    0%, 100% { transform: translateX(0); }
                    10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
                    20%, 40%, 60%, 80% { transform: translateX(5px); }
                }
            `;
            document.head.appendChild(shakeStyle);
        });
    </script>

    <script src="footer.js"></script>
</body>
</html>
